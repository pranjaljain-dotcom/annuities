  <script>
    var cards = document.querySelectorAll('.rt-card');

    cards.forEach(function(card) {
      card.addEventListener('click', function() {
        cards.forEach(function(c) { c.classList.remove('is-selected'); });
        card.classList.add('is-selected');

        setTimeout(function() {
          var goal = sessionStorage.getItem('annuities_goal');
          if (goal === 'retirement') {
            EDS.navigate('../income-age-step/');
          } else if (goal === 'wealth') {
            EDS.navigate('../growth-period-step/');
          } else {
            EDS.navigate('../dependents-step/');
          }
        }, 300);
      });
    });
  </script>
